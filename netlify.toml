[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Single-page site — route all unknown paths to index.html so deep links work.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Light security headers. Adjust as needed if you add third-party embeds.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
